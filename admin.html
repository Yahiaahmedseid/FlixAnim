<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الأدمن</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚙️ لوحة التحكم</h1>
            <div>
                <button onclick="logout()" style="background:#c0392b; border:none; padding:10px 20px; border-radius:5px; color:#fff; cursor:pointer;">🚪 تسجيل خروج</button>
                <a href="index.html" class="login-btn">🏠 الموقع</a>
            </div>
        </header>

        <!-- قسم إضافة أنمي جديد -->
        <div class="admin-panel">
            <h2>➕ إضافة أنمي جديد</h2>
            <input type="text" id="new-title" placeholder="اسم الأنمي (مثل: ون بيس)">
            <input type="text" id="new-image" placeholder="رابط الصورة (URL)">
            <input type="text" id="new-desc" placeholder="وصف مختصر (اختياري)">
            <button onclick="addAnime()">💾 حفظ الأنمي</button>
        </div>

        <hr style="border-color:#0f3460; margin:30px 0;">

        <!-- قسم إضافة حلقة (يطلب اختيار الأنمي) -->
        <div class="admin-panel">
            <h2>➕ إضافة حلقة جديدة</h2>
            <select id="anime-select">
                <option value="">-- اختر الأنمي --</option>
            </select>
            <input type="number" id="ep-number" placeholder="رقم الحلقة (مثل: 1)">
            <input type="text" id="ep-title" placeholder="عنوان الحلقة (اختياري)">
            <input type="text" id="ep-url" placeholder="رابط الفيديو (YouTube أو مباشر)">
            <button onclick="addEpisode()">💾 حفظ الحلقة</button>
        </div>

        <hr style="border-color:#0f3460; margin:30px 0;">

        <!-- عرض جميع الأنميات مع خيار الحذف -->
        <div class="admin-panel">
            <h2>📋 قائمة الأنميات (اضغط حذف لمسح الأنمي وجميع حلقاته)</h2>
            <div id="admin-anime-list"></div>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        // التحقق من تسجيل الدخول
        auth.onAuthStateChanged(user => {
            if (!user) window.location.href = 'login.html';
        });

        // جلب الأنميات لعرضها في القائمة وفي خانة الاختيار (Select)
        function loadAnimeLists() {
            const select = document.getElementById('anime-select');
            const listDiv = document.getElementById('admin-anime-list');
            
            db.collection('anime').orderBy('title').onSnapshot((snapshot) => {
                // تحديث الـ Select
                select.innerHTML = '<option value="">-- اختر الأنمي --</option>';
                listDiv.innerHTML = '';
                
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const id = doc.id;
                    // إضافة للقائمة المنسدلة
                    select.innerHTML += `<option value="${id}">${data.title}</option>`;
                    
                    // إضافة لعرض القائمة مع زر حذف
                    listDiv.innerHTML += `
                        <div class="admin-item">
                            <span><strong>${data.title}</strong> (${data.description || ''})</span>
                            <button class="delete-btn" onclick="deleteAnime('${id}')">🗑️ حذف الأنمي</button>
                        </div>
                    `;
                });
            });
        }
        loadAnimeLists();

        // دالة إضافة أنمي
        function addAnime() {
            const title = document.getElementById('new-title').value.trim();
            const imageUrl = document.getElementById('new-image').value.trim();
            const description = document.getElementById('new-desc').value.trim();
            if (!title) { alert('يرجى كتابة اسم الأنمي'); return; }
            
            db.collection('anime').add({
                title: title,
                imageUrl: imageUrl || 'https://via.placeholder.com/200x260/16213e/e94560?text=No+Image',
                description: description || ''
            }).then(() => {
                alert('✅ تم إضافة الأنمي بنجاح!');
                document.getElementById('new-title').value = '';
                document.getElementById('new-image').value = '';
                document.getElementById('new-desc').value = '';
            }).catch(err => alert('❌ خطأ: ' + err.message));
        }

        // دالة إضافة حلقة
        function addEpisode() {
            const animeId = document.getElementById('anime-select').value;
            const epNum = parseInt(document.getElementById('ep-number').value);
            const epTitle = document.getElementById('ep-title').value.trim();
            const videoUrl = document.getElementById('ep-url').value.trim();

            if (!animeId) { alert('اختر الأنمي أولاً'); return; }
            if (!epNum || epNum <= 0) { alert('أدخل رقم حلقة صحيح'); return; }
            if (!videoUrl) { alert('أدخل رابط الفيديو'); return; }

            db.collection('anime').doc(animeId).collection('episodes').add({
                epNum: epNum,
                title: epTitle || `الحلقة ${epNum}`,
                videoUrl: videoUrl
            }).then(() => {
                alert('✅ تم إضافة الحلقة بنجاح!');
                document.getElementById('ep-number').value = '';
                document.getElementById('ep-title').value = '';
                document.getElementById('ep-url').value = '';
            }).catch(err => alert('❌ خطأ: ' + err.message));
        }

        // دالة حذف الأنمي (مع حذف جميع حلقاته تلقائياً بقواعد Firebase، لكن لحذف المجموعة الفرعية نحتاج حلقة)
        // ملاحظة: حذف مستند يحذف المستند فقط، لكن الحلقات تبقى. لحذفها كلها بهذه الطريقة البسيطة، سنستخدم حلقة.
        async function deleteAnime(animeId) {
            if (!confirm('⚠️ هل أنت متأكد من حذف هذا الأنمي وجميع حلقاته؟')) return;
            
            try {
                // 1. جلب جميع الحلقات وحذفها
                const episodesSnap = await db.collection('anime').doc(animeId).collection('episodes').get();
                const batch = db.batch();
                episodesSnap.forEach(doc => { batch.delete(doc.ref); });
                await batch.commit();
                
                // 2. حذف وثيقة الأنمي نفسه
                await db.collection('anime').doc(animeId).delete();
                alert('✅ تم الحذف بنجاح!');
            } catch (error) {
                alert('❌ فشل الحذف: ' + error.message);
            }
        }

        // دالة تسجيل الخروج
        function logout() {
            auth.signOut().then(() => window.location.href = 'login.html');
        }
    </script>
</body>
</html>
