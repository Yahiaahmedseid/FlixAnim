<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول الأدمن</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-box { max-width: 400px; margin: 50px auto; background: #16213e; padding: 40px; border-radius: 15px; }
        .login-box input { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 5px; background: #0f3460; color: #fff; }
        .login-box button { width: 100%; padding: 15px; background: #e94560; border: none; border-radius: 5px; color: #fff; font-weight: bold; cursor: pointer; }
        .error { color: #ff6b6b; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <header><h1>🔐 دخول الأدمن</h1><a href="index.html" class="login-btn">🏠 الرئيسية</a></header>
        <div class="login-box">
            <h2 style="text-align:center; margin-bottom:20px;">تسجيل الدخول</h2>
            <div id="error-msg" class="error"></div>
            <input type="email" id="email" placeholder="البريد الإلكتروني" value="admin@example.com">
            <input type="password" id="password" placeholder="كلمة المرور" value="123456">
            <button onclick="login()">🚀 دخول</button>
            <p style="text-align:center; margin-top:15px; color:#aaa;">(استخدم بيانات الدخول التي سجلتها في Firebase Auth)</p>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        // التحقق إذا كان الأدمن مسجل الدخول بالفعل، يوجه للوحة التحكم
        auth.onAuthStateChanged(user => {
            if (user) window.location.href = 'admin.html';
        });

        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-msg');
            
            auth.signInWithEmailAndPassword(email, password)
                .then(() => { window.location.href = 'admin.html'; })
                .catch((error) => {
                    errorEl.textContent = '❌ ' + error.message;
                });
        }
    </script>
</body>
</html>
